<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawing Canvas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-icon">🎨</div>
      <h1 class="splash-title">Drawing Canvas</h1>
      <p class="splash-sub">Your creative studio, reimagined.</p>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="app-logo">🎨</span>
        <span class="app-name">Drawing Canvas</span>
      </div>

      <div class="topbar-center">
        <!-- File Menu -->
        <div class="menu-group">
          <button class="menu-btn" id="newBtn" title="New Canvas (Ctrl+N)">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            New
          </button>
          <button class="menu-btn" id="saveBtn" title="Save Image (Ctrl+S)">
            <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save
          </button>
          <button class="menu-btn" id="openBtn" title="Open Image">
            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Open
          </button>
          <input type="file" id="fileInput" accept="image/*" style="display:none"/>
        </div>

        <!-- Edit Menu -->
        <div class="menu-group">
          <button class="menu-btn" id="undoBtn" title="Undo (Ctrl+Z)">
            <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
            Undo
          </button>
          <button class="menu-btn" id="redoBtn" title="Redo (Ctrl+Y)">
            <svg viewBox="0 0 24 24"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 0 4-4h12"/></svg>
            Redo
          </button>
          <button class="menu-btn" id="clearBtn" title="Clear All">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Clear
          </button>
        </div>

        <!-- Canvas Size -->
        <div class="menu-group">
          <select id="canvasSizeSelect" class="menu-select" title="Canvas Size">
            <option value="800x600">800 × 600</option>
            <option value="1024x768">1024 × 768</option>
            <option value="1280x720">1280 × 720 (HD)</option>
            <option value="1920x1080">1920 × 1080 (FHD)</option>
            <option value="custom">Custom…</option>
          </select>
        </div>
      </div>

      <div class="topbar-right">
        <span id="coordsDisplay" class="coords">x:0 y:0</span>
        <label class="zoom-label">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="range" id="zoomRange" min="10" max="400" value="100" step="10" />
          <span id="zoomVal">100%</span>
        </label>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="workspace">

      <!-- Left Toolbar -->
      <aside class="toolbar-left">
        <div class="tool-section-label">TOOLS</div>

        <div class="tool-grid">
          <button class="tool-btn active" data-tool="pen" title="Pen (P)">
            <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="pencil" title="Pencil (N)">
            <svg viewBox="0 0 24 24"><line x1="18" y1="2" x2="22" y2="6"/><path d="M7.5 20.5 19 9l-4-4L3.5 16.5 2 22z"/></svg>
          </button>
          <button class="tool-btn" data-tool="brush" title="Brush (B)">
            <svg viewBox="0 0 24 24"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1 1 2.26 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg>
          </button>
          <button class="tool-btn" data-tool="airbrush" title="Spray (A)">
            <svg viewBox="0 0 24 24"><path d="M3 9l2-2 2 2-2 2z"/><path d="M7 5V3"/><path d="M11 7H9"/><path d="M7 11v2"/><path d="M5 7H3"/><rect x="9" y="9" width="13" height="9" rx="2"/><line x1="9" y1="18" x2="9" y2="21"/><line x1="15" y1="18" x2="15" y2="21"/></svg>
          </button>
          <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
            <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l10-10 7 7-3 3z"/><path d="M6.0 11.0 13.0 18.0"/></svg>
          </button>
          <button class="tool-btn" data-tool="fill" title="Fill (F)">
            <svg viewBox="0 0 24 24"><path d="M19 11l-8-8-8.5 8.5a5.5 5.5 0 0 0 7.78 7.78L19 11z"/><line x1="19" y1="11" x2="22" y2="14"/></svg>
          </button>
          <button class="tool-btn" data-tool="eyedropper" title="Color Picker (I)">
            <svg viewBox="0 0 24 24"><path d="M20 9l-1.5-7.5-16 16 6 6 16-16z"/><line x1="3.5" y1="20.5" x2="5" y2="22"/></svg>
          </button>
          <button class="tool-btn" data-tool="text" title="Text (T)">
            <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
          </button>
          <button class="tool-btn" data-tool="line" title="Line (L)">
            <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/></svg>
          </button>
          <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
          </button>
          <button class="tool-btn" data-tool="circle" title="Circle (C)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
          </button>
          <button class="tool-btn" data-tool="triangle" title="Triangle">
            <svg viewBox="0 0 24 24"><polygon points="12 2 22 22 2 22"/></svg>
          </button>
          <button class="tool-btn" data-tool="arrow" title="Arrow">
            <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="12 5 19 5 19 12"/></svg>
          </button>
          <button class="tool-btn" data-tool="star" title="Star">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <button class="tool-btn" data-tool="select" title="Select (S)">
            <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
          </button>
          <button class="tool-btn" data-tool="move" title="Move (M)">
            <svg viewBox="0 0 24 24"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
          </button>
        </div>

        <div class="tool-section-label" style="margin-top:16px;">FILL</div>
        <div class="fill-options">
          <label class="fill-opt" title="Stroke only">
            <input type="radio" name="fillMode" value="none" checked /> <span class="fill-box stroke-only"></span>
          </label>
          <label class="fill-opt" title="Fill only">
            <input type="radio" name="fillMode" value="fill" /> <span class="fill-box fill-only"></span>
          </label>
          <label class="fill-opt" title="Stroke + Fill">
            <input type="radio" name="fillMode" value="both" /> <span class="fill-box both-box"></span>
          </label>
        </div>

        <div class="tool-section-label" style="margin-top:16px;">OPACITY</div>
        <input type="range" id="opacityRange" min="1" max="100" value="100" class="side-range" />
        <span id="opacityVal" class="side-range-val">100%</span>
      </aside>

      <!-- Canvas Viewport -->
      <main class="canvas-area" id="canvasArea">
        <div class="canvas-wrapper" id="canvasWrapper">
          <canvas id="mainCanvas"></canvas>
          <canvas id="overlayCanvas"></canvas>
          <!-- Text input overlay -->
          <textarea id="textInput" class="text-input" placeholder="Type here…"></textarea>
        </div>
      </main>

      <!-- Right Sidebar -->
      <aside class="sidebar-right">

        <!-- Colors -->
        <div class="panel">
          <div class="panel-title">COLORS</div>

          <div class="color-swatches-row">
            <div class="swatch-pair">
              <div id="bgColorSwatch" class="color-swatch swatch-bg" title="Background color"></div>
              <div id="fgColorSwatch" class="color-swatch swatch-fg" title="Foreground / stroke color"></div>
            </div>
            <button class="icon-btn swap-btn" id="swapColors" title="Swap colors">⇄</button>
          </div>

          <div class="color-inputs-row">
            <label>
              <span>Stroke</span>
              <input type="color" id="strokeColorPicker" value="#000000" />
            </label>
            <label>
              <span>Fill</span>
              <input type="color" id="fillColorPicker" value="#ffffff" />
            </label>
          </div>

          <!-- Palette -->
          <div class="palette" id="palette"></div>

          <!-- Gradient presets -->
          <div class="panel-title" style="margin-top:10px;">GRADIENTS</div>
          <div class="gradient-list" id="gradientList"></div>
        </div>

        <!-- Brush -->
        <div class="panel">
          <div class="panel-title">BRUSH</div>
          <div class="brush-options">
            <button class="brush-type-btn active" data-brush="round" title="Round">●</button>
            <button class="brush-type-btn" data-brush="square" title="Square">■</button>
            <button class="brush-type-btn" data-brush="flat" title="Flat">▬</button>
            <button class="brush-type-btn" data-brush="texture" title="Texture">✦</button>
            <button class="brush-type-btn" data-brush="splatter" title="Splatter">✳</button>
          </div>
          <label class="slider-label">
            Size <span id="sizeVal">10px</span>
            <input type="range" id="brushSize" min="1" max="100" value="10" />
          </label>
          <label class="slider-label">
            Hardness <span id="hardnessVal">80%</span>
            <input type="range" id="hardness" min="0" max="100" value="80" />
          </label>
          <label class="slider-label">
            Spacing <span id="spacingVal">5%</span>
            <input type="range" id="spacing" min="1" max="50" value="5" />
          </label>
          <label class="slider-label">
            Angle <span id="angleVal">0°</span>
            <input type="range" id="brushAngle" min="0" max="360" value="0" />
          </label>
        </div>

        <!-- Text Options -->
        <div class="panel" id="textPanel" style="display:none;">
          <div class="panel-title">TEXT</div>
          <select id="fontFamily" class="full-select">
            <option>Arial</option>
            <option>Georgia</option>
            <option>Impact</option>
            <option>Comic Sans MS</option>
            <option>Courier New</option>
            <option>Times New Roman</option>
            <option>Verdana</option>
            <option>Trebuchet MS</option>
          </select>
          <label class="slider-label">
            Size <span id="fontSizeVal">24px</span>
            <input type="range" id="fontSize" min="8" max="120" value="24" />
          </label>
          <div class="text-style-btns">
            <button class="style-btn" id="boldBtn" title="Bold"><b>B</b></button>
            <button class="style-btn" id="italicBtn" title="Italic"><i>I</i></button>
            <button class="style-btn" id="underlineBtn" title="Underline"><u>U</u></button>
          </div>
        </div>

        <!-- Filters / Adjustments -->
        <div class="panel">
          <div class="panel-title">FILTERS</div>
          <div class="filter-btns">
            <button class="filter-btn" data-filter="grayscale">Grayscale</button>
            <button class="filter-btn" data-filter="invert">Invert</button>
            <button class="filter-btn" data-filter="sepia">Sepia</button>
            <button class="filter-btn" data-filter="blur">Blur</button>
            <button class="filter-btn" data-filter="sharpen">Sharpen</button>
            <button class="filter-btn" data-filter="emboss">Emboss</button>
            <button class="filter-btn" data-filter="brightness+">Brighter</button>
            <button class="filter-btn" data-filter="brightness-">Darker</button>
          </div>
        </div>

        <!-- Layers -->
        <div class="panel">
          <div class="panel-title">
            LAYERS
            <button class="icon-btn" id="addLayerBtn" title="Add layer">+</button>
          </div>
          <div id="layerList" class="layer-list">
            <div class="layer-item active" data-layer="0">
              <span class="layer-vis">👁</span>
              <span class="layer-name">Layer 1</span>
              <span class="layer-del" title="Delete">✕</span>
            </div>
          </div>
        </div>

      </aside>
    </div>

    <!-- Status bar -->
    <footer class="statusbar">
      <span id="toolName">Tool: Pen</span>
      <span id="canvasSize">Canvas: 800 × 600</span>
      <span id="zoomStatus">Zoom: 100%</span>
      <span id="historyStatus">History: 0 / 0</span>
    </footer>

    <!-- Custom canvas size modal -->
    <div id="customSizeModal" class="modal hidden">
      <div class="modal-box">
        <h3>Custom Canvas Size</h3>
        <label>Width <input type="number" id="customW" value="800" min="10" max="4000" /></label>
        <label>Height <input type="number" id="customH" value="600" min="10" max="4000" /></label>
        <div class="modal-btns">
          <button id="applySize">Apply</button>
          <button id="cancelSize">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Notification toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
